<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2025-2026 声译经典 音演传奇</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body class="screen-page" onload="initScreen()">
  <main id="screenMain" class="welcome-screen premiere-welcome">
    <section class="welcome-main">
      <div class="premiere-ribbon">2025-2026 DUBBING COMPETITION</div>
      <div class="premiere-title">
        <span>声译经典</span>
        <span>音演传奇</span>
      </div>
      <div class="premiere-divider"></div>
      <p class="premiere-cn">欢迎各位参赛选手和观众来到现场</p>
      <p class="premiere-en">Welcome contestants and audience to the live dubbing stage</p>
      <div class="premiere-note">每组演绎结束后，投票通道将在大屏提示后开启</div>
    </section>

    <section class="welcome-qr-mini" aria-label="Voting QR entrance">
      <div class="mini-qr-title">投票入口</div>
      <div class="qr-box mini-qr"><div id="qrcode"></div></div>
      <p class="subtle vote-url" id="voteUrlText"></p>
    </section>

    <nav class="emergency-dock" aria-label="Emergency links">
      <span>☰</span>
      <a href="admin.html" target="_blank">后台</a>
      <a href="vote.html" target="_blank">投票页</a>
      <button onclick="location.reload()">刷新</button>
    </nav>
  </main>
</body>
</html>
