<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dubbing Competition Screen</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="page fullscreen">
    <section id="normalView" class="screen-layout">
      <div class="card stage">
        <div class="badge">🎙️ Dubbing Competition Voting</div>
        <h1 class="title" id="mainTitle">配音比赛投票系统</h1>
        <p class="subtitle" id="mainSubtitle">请扫码进入投票页面，等待后台开始当前小组投票。</p>
        <div class="group-name" id="groupName">Waiting</div>
        <div class="phase" id="phaseText">Waiting / 等待开始</div>
        <div class="timer" id="bigTimer">--:--</div>
      </div>

      <div class="card qr-card">
        <div class="timer-ring-wrap">
          <div class="timer-ring" id="ring" style="--progress: 0deg"></div>
          <div class="timer-ring-text" id="ringText">--:--</div>
        </div>
        <h2>Scan to Vote<br>扫码投票</h2>
        <div class="qr-box"><img id="qrImg" alt="Vote QR Code" /></div>
        <div class="small" id="voteUrl">Loading vote URL...</div>
      </div>
    </section>

    <section id="rankingView" class="card stage hidden">
      <div class="badge">🏆 Final Result</div>
      <h1 class="title">最终排名</h1>
      <p class="subtitle">Average score = total score ÷ number of votes</p>
      <table class="results">
        <thead><tr><th>Rank</th><th>Group</th><th>Average</th><th>Votes</th></tr></thead>
        <tbody id="rankingBody"></tbody>
      </table>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/common.js"></script>
  <script>
    const normalView = document.getElementById('normalView');
    const rankingView = document.getElementById('rankingView');
    const groupName = document.getElementById('groupName');
    const phaseText = document.getElementById('phaseText');
    const bigTimer = document.getElementById('bigTimer');
    const ringText = document.getElementById('ringText');
    const ring = document.getElementById('ring');
    const mainTitle = document.getElementById('mainTitle');
    const mainSubtitle = document.getElementById('mainSubtitle');

    async function loadQr() {
      const data = await api('/api/qr');
      document.getElementById('qrImg').src = data.qr;
      document.getElementById('voteUrl').textContent = data.voteUrl;
    }

    function renderRanking(results) {
      document.getElementById('rankingBody').innerHTML = results.map(r => `
        <tr>
          <td>${r.rank}</td>
          <td>${r.name}</td>
          <td>${r.averageScore ?? '-'}</td>
          <td>${r.voteCount}</td>
        </tr>
      `).join('');
    }

    function renderState(payload) {
      const state = payload.state;
      if (!state) return;
      if (state.phase === 'ranking' || state.showRanking) {
        normalView.classList.add('hidden');
        rankingView.classList.remove('hidden');
        renderRanking(payload.results || []);
        return;
      }
      rankingView.classList.add('hidden');
      normalView.classList.remove('hidden');

      groupName.textContent = state.currentGroupName || 'Waiting';
      phaseText.textContent = phaseLabel(state.phase);
      const seconds = state.phase === 'canvassing' || state.phase === 'thinking' ? state.remainingSeconds : 0;
      const text = seconds ? fmt(seconds) : '--:--';
      bigTimer.textContent = text;
      ringText.textContent = text;

      let total = state.phase === 'canvassing' ? 60 : (state.phase === 'thinking' ? 60 : 1);
      let progress = seconds ? Math.max(0, Math.min(360, (seconds / total) * 360)) : 0;
      ring.style.setProperty('--progress', `${progress}deg`);

      if (state.phase === 'idle') {
        mainTitle.textContent = '配音比赛投票系统';
        mainSubtitle.textContent = '请扫码进入投票页面，等待后台开始当前小组投票。';
      } else if (state.phase === 'closed') {
        mainTitle.textContent = '本组投票已结束';
        mainSubtitle.textContent = '请欢迎下一组。';
      } else {
        mainTitle.textContent = 'Now Voting';
        mainSubtitle.textContent = `Current vote count: ${state.voteCount}`;
      }
    }

    loadQr();
    socket.on('state:update', renderState);
  </script>
</body>
</html>
