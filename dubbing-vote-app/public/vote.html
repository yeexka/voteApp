<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vote</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="vote-page">
    <section class="card vote-card">
      <div class="badge">📱 Anonymous Device Vote</div>
      <h1 id="voteTitle">请等待投票开始</h1>
      <p class="subtitle" id="voteSubtitle">Waiting for voting to start...</p>
      <div class="timer" id="voteTimer">--:--</div>
      <div id="votePanel" class="hidden">
        <p class="notice">请选择 1 到 10 分。提交后，本设备本组不能重复投票。</p>
        <div class="score-grid" id="scoreGrid"></div>
        <button id="submitBtn" disabled>Submit Vote / 提交投票</button>
      </div>
      <div class="notice" id="messageBox">页面会自动同步后台状态。</div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/common.js"></script>
  <script>
    let selectedScore = null;
    let currentGroupId = null;
    let hasVoted = false;

    function getVoterToken() {
      let token = localStorage.getItem('dubbingVoterToken');
      if (!token) {
        token = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        localStorage.setItem('dubbingVoterToken', token);
      }
      return token;
    }

    const voterToken = getVoterToken();
    const grid = document.getElementById('scoreGrid');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');
    const votePanel = document.getElementById('votePanel');

    for (let i = 1; i <= 10; i++) {
      const btn = document.createElement('button');
      btn.className = 'score-btn';
      btn.textContent = i;
      btn.onclick = () => {
        selectedScore = i;
        document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        submitBtn.disabled = false;
      };
      grid.appendChild(btn);
    }

    async function checkMyVote(groupId) {
      if (!groupId) return { voted: false };
      return api(`/api/my-vote/${encodeURIComponent(voterToken)}/${groupId}`);
    }

    async function renderVote(payload) {
      const state = payload.state;
      if (!state) return;
      const title = document.getElementById('voteTitle');
      const sub = document.getElementById('voteSubtitle');
      const timer = document.getElementById('voteTimer');

      if (state.currentGroupId !== currentGroupId) {
        currentGroupId = state.currentGroupId;
        selectedScore = null;
        submitBtn.disabled = true;
        document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
        hasVoted = false;
        if (currentGroupId) {
          const mine = await checkMyVote(currentGroupId);
          hasVoted = !!mine.voted;
          if (hasVoted) messageBox.textContent = `你已完成本组投票。Your score: ${mine.score}`;
        }
      }

      if (!state.currentGroupId || state.phase === 'idle' || state.phase === 'ranking') {
        title.textContent = '请等待投票开始';
        sub.textContent = 'Waiting for voting to start...';
        timer.textContent = '--:--';
        votePanel.classList.add('hidden');
        messageBox.textContent = '你可以停留在本页面，投票开始后会自动更新。';
        return;
      }

      title.textContent = state.currentGroupName;
      sub.textContent = phaseLabel(state.phase);
      timer.textContent = state.totalRemainingSeconds ? fmt(state.totalRemainingSeconds) : '--:--';

      if (hasVoted) {
        votePanel.classList.add('hidden');
        return;
      }

      if (state.votingOpen && (state.phase === 'canvassing' || state.phase === 'thinking')) {
        votePanel.classList.remove('hidden');
        messageBox.textContent = '投票开放中。本设备本组只能提交一次。';
      } else {
        votePanel.classList.add('hidden');
        messageBox.textContent = '本组投票已结束。Voting closed.';
      }
    }

    submitBtn.onclick = async () => {
      if (!selectedScore) return;
      submitBtn.disabled = true;
      try {
        const data = await api('/api/vote', {
          method: 'POST',
          body: JSON.stringify({ score: selectedScore, voterToken })
        });
        hasVoted = true;
        votePanel.classList.add('hidden');
        messageBox.textContent = `投票成功！Your score: ${data.score}`;
      } catch (err) {
        messageBox.textContent = err.message;
      }
    };

    socket.on('state:update', renderVote);
  </script>
</body>
</html>
