<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dubbing Vote Screen</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body class="screen-page" onload="initScreen()">
  <main id="screenMain" class="stage-screen">
    <section class="stage-hero">
      <div class="stage-kicker">DUBBING COMPETITION</div>
      <h1 id="screenGroup" class="stage-title">Dubbing Competition</h1>
      <div id="screenPhase" class="stage-phase">请扫码进入投票页面</div>
      <p id="screenHint" class="stage-hint">Waiting for the admin to start voting.</p>
    </section>

    <section class="countdown-zone">
      <div class="ring-wrap" id="ringWrap">
        <svg class="timer-ring" viewBox="0 0 220 220" aria-label="Countdown ring">
          <circle class="ring-bg" cx="110" cy="110" r="94"></circle>
          <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="94"></circle>
        </svg>
        <div class="ring-content">
          <div id="screenTimer" class="ring-time">--:--</div>
          <div id="ringLabel" class="ring-label">WAITING</div>
        </div>
      </div>

      <div class="qr-stage">
        <div class="qr-box"><div id="qrcode"></div></div>
        <div class="qr-caption">Scan to Vote / 扫码投票</div>
        <p class="subtle vote-url" id="voteUrlText"></p>
      </div>
    </section>
  </main>
</body>
</html>
